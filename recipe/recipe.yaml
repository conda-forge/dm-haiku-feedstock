schema_version: 1

context:
  name: dm-haiku
  version: 0.0.16
  python_min: 3.10

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 1830b0ce63c5cef2fb3a63a13033c9d8f612ee7f896f2b0b25a6ba484f5fad28

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - absl-py >=0.7.1
    - jmp >=0.0.2
    - numpy >=1.18.0
    - tabulate >=0.8.9
    - flax >=0.7.1

tests:
  - python:
      imports:
        - haiku
      pip_check: true

      python_version: ${{ python_min }}.*
about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Haiku is a library for building neural networks in JAX.
  description: |
    Haiku is a simple neural network library for JAX developed by some
    of the authors of Sonnet, a neural network library for TensorFlow.
  homepage: https://github.com/deepmind/dm-haiku
  repository: https://dm-haiku.readthedocs.io/
  documentation: https://github.com/deepmind/dm-haiku

extra:
  recipe-maintainers:
    - jan-janssen
